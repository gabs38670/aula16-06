<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/calculadora/script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora</h1>
    <input type="number" id="n1" placeholder="Nº 1">
    <input type="number" id="n2" placeholder="Nº 2">

    <button onclick='calc("+")'>+</button>
    <button onclick='calc("-")'>-</button>
    <button onclick='calc("*")'>*</button>
    <button onclick='calc("/")'>/</button>

    <p id="resultado"></p>

</body>
</html>
